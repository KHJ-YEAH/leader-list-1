<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>본사 리더 명단</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<style>
:root {
  --bg: #fafaf7;
  --surface: #ffffff;
  --surface-2: #f5f4ef;
  --border: #e6e3db;
  --border-strong: #d5d1c5;
  --text: #1a1816;
  --text-2: #545049;
  --text-3: #8b867d;
  --muted: #b3aea2;

  --accent: oklch(0.48 0.12 265);
  --accent-soft: oklch(0.95 0.02 265);
  --accent-text: oklch(0.35 0.14 265);

  --l1: oklch(0.50 0.13 35);
  --l1-bg: oklch(0.96 0.02 35);
  --l2: oklch(0.48 0.12 265);
  --l2-bg: oklch(0.96 0.02 265);
  --l3: oklch(0.50 0.10 175);
  --l3-bg: oklch(0.96 0.02 175);

  --warn: oklch(0.58 0.16 30);
  --warn-bg: oklch(0.97 0.02 30);

  --header-h: 78px;

  --shadow-sm: 0 1px 2px rgba(20, 18, 14, 0.04);
  --shadow: 0 2px 8px rgba(20, 18, 14, 0.06);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { min-height: 100vh; }

.app {
  display: grid;
  grid-template-columns: 256px 1fr;
  min-height: 100vh;
}

/* ---------- Sidebar ---------- */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 14px 24px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 20;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 8px 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.brand-mark {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--text);
  color: var(--bg);
  display: grid; place-items: center;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.02em;
}
.brand-title { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
.brand-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }

.nav {
  display: flex; flex-direction: column;
  gap: 1px;
  flex: 1;
}
.nav-item {
  all: unset; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  padding: 8px 10px; border-radius: 6px;
  font-size: 13px; color: var(--text-2);
  transition: background 0.12s, color 0.12s;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.is-active { background: var(--text); color: var(--surface); }
.nav-item.is-active .nav-count { color: rgba(255,255,255,0.7); }
.nav-label { font-weight: 500; letter-spacing: -0.01em; }
.nav-count { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; font-weight: 500; }
.nav-divider { height: 1px; background: var(--border); margin: 8px 4px; }

.legend {
  margin-top: 18px;
  padding: 12px 10px;
  background: var(--surface-2);
  border-radius: 8px;
  font-size: 11px;
  color: var(--text-2);
}
.legend-title { font-weight: 600; color: var(--text); margin-bottom: 8px; letter-spacing: -0.01em; }
.legend-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; line-height: 1.4; }
.chip {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 3px; flex-shrink: 0;
}
.chip-l1 { background: var(--l1-bg); color: var(--l1); }
.chip-l2 { background: var(--l2-bg); color: var(--l2); }
.chip-l3 { background: var(--l3-bg); color: var(--l3); }

/* ---------- Main ---------- */
.main { display: flex; flex-direction: column; min-width: 0; }

.header {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px;
  padding: 18px 32px 14px;
  background: rgba(250, 250, 247, 0.94);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  min-height: var(--header-h);
}
.crumb { display: flex; gap: 6px; font-size: 12px; color: var(--text-3); margin-bottom: 4px; }
.crumb-sep { color: var(--muted); }
.crumb-current { color: var(--text-2); font-weight: 500; }
.title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }

.header-r { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.search {
  display: flex; align-items: center; gap: 6px;
  padding: 0 10px; height: 34px;
  background: var(--surface);
  border: 1px solid var(--border); border-radius: 6px;
  width: 220px; color: var(--text-3);
  transition: border 0.12s;
}
.search:focus-within { border-color: var(--accent); color: var(--text); }
.search input { all: unset; flex: 1; font-size: 13px; color: var(--text); font-family: inherit; }
.search input::placeholder { color: var(--text-3); }
.search-clear {
  all: unset; cursor: pointer; width: 18px; height: 18px;
  border-radius: 4px; display: grid; place-items: center;
  color: var(--text-3); font-size: 16px; line-height: 1;
}
.search-clear:hover { background: var(--surface-2); color: var(--text); }

.view-toggle {
  display: flex; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 2px;
}
.view-toggle button {
  all: unset; cursor: pointer;
  padding: 4px 12px; font-size: 12px; color: var(--text-3);
  border-radius: 4px; font-weight: 500; transition: all 0.12s;
}
.view-toggle button.is-active { background: var(--text); color: var(--surface); }

.btn-ghost, .btn-primary {
  all: unset; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 12px; height: 34px;
  border-radius: 6px;
  font-size: 12px; font-weight: 500;
  transition: all 0.12s;
}
.btn-ghost {
  background: var(--surface); border: 1px solid var(--border); color: var(--text-2);
}
.btn-ghost:hover { border-color: var(--border-strong); color: var(--text); }
.btn-ghost.is-on {
  background: var(--accent-soft); border-color: var(--accent); color: var(--accent-text);
}
.btn-warn { color: var(--warn) !important; }
.btn-warn:hover { background: var(--warn-bg); border-color: var(--warn) !important; }
.btn-primary {
  background: var(--text); color: var(--surface);
  border: 1px solid var(--text);
}
.btn-primary:hover { background: #000; }

/* ---------- Content ---------- */
.content { padding: 20px 32px 40px; flex: 1; min-width: 0; }
.empty { padding: 60px 0; text-align: center; color: var(--text-3); font-size: 14px; }

/* ---------- Table ---------- */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: visible;
  box-shadow: var(--shadow-sm);
}
.org-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
  table-layout: fixed;
}
.org-table thead {
  position: sticky;
  top: var(--header-h);
  z-index: 10;
}
.org-table thead th {
  background: var(--surface-2);
  text-align: left;
  padding: 12px 14px;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-2);
  letter-spacing: -0.01em;
  vertical-align: top;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border-strong);
  box-shadow: 0 1px 0 var(--border-strong);
}
.org-table thead th:first-child { border-top-left-radius: 10px; }
.org-table thead th:last-child { border-top-right-radius: 10px; border-right: 0; }
.th-center { text-align: center !important; }
.th-chip {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 6px; border-radius: 3px;
}
.th-sub {
  display: block; margin-top: 4px;
  font-size: 10px; font-weight: 400; color: var(--text-3);
  letter-spacing: 0; line-height: 1.3;
}

.org-table tbody td {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  vertical-align: top;
  background: var(--surface);
}
.org-table tbody td:last-child { border-right: 0; }
.org-table tbody tr.bonbu-start td { border-top: 2px solid var(--border-strong); }
.org-table tbody tr.sil-start td:not(.cell-bonbu) { border-top-color: var(--border); }
.org-table tbody tr:first-child td { border-top: 0; }

.cell-bonbu {
  background: var(--surface-2) !important;
  border-right: 1px solid var(--border-strong) !important;
}
.bonbu-cell { padding: 4px 0; }
.bonbu-name {
  font-size: 14px; font-weight: 600;
  color: var(--text); letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.bonbu-meta {
  font-size: 11px; color: var(--text-3);
  display: flex; gap: 4px; align-items: center; flex-wrap: wrap;
}
.dot-sep { color: var(--muted); }
.bonbu-breakdown {
  margin-top: 6px;
  font-size: 10px;
  color: var(--text-3);
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  align-items: baseline;
  line-height: 1.4;
}
.bonbu-breakdown .bb-l1 { color: var(--l1); font-weight: 500; }
.bonbu-breakdown .bb-l2 { color: var(--l2); font-weight: 500; }
.bonbu-breakdown .bb-l3 { color: var(--l3); font-weight: 500; }
.bonbu-breakdown .bb-staff { color: var(--text-2); font-weight: 500; }
.bonbu-breakdown .bb-sep { color: var(--muted); }

.cell-sil { background: #fdfcfa; }
.sil-name {
  font-size: 13px; font-weight: 500; color: var(--text);
  padding: 2px 0;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.sil-name.is-direct { color: var(--text-2); font-style: italic; }
.badge-direct {
  font-size: 9px; padding: 1px 5px;
  background: var(--surface-2); color: var(--text-3);
  border-radius: 3px; font-weight: 500; letter-spacing: 0.02em;
  font-style: normal;
}
.cell-team .team-name { font-size: 13px; color: var(--text); padding: 2px 0; }

.cell-count {
  text-align: center !important;
  font-variant-numeric: tabular-nums;
}
.member-count {
  display: inline-block;
  min-width: 28px;
  padding: 2px 8px;
  background: var(--surface-2);
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
}

.leader { display: flex; align-items: flex-start; gap: 8px; padding: 2px 0; }
.leader-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
.dot-l1, .leader-dot.dot-l1 { background: var(--l1); }
.dot-l2, .leader-dot.dot-l2 { background: var(--l2); }
.dot-l3, .leader-dot.dot-l3 { background: var(--l3); }
.leader-text { min-width: 0; flex: 1; }
.leader-name {
  font-weight: 600; font-size: 13px; color: var(--text);
  letter-spacing: -0.01em;
}
.leader-rank { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.leader-empty { color: var(--muted); font-size: 12px; }
.cell-empty { color: var(--muted); font-size: 12px; text-align: center; }

.sub-leader {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
}
.sub-leader-note { font-size: 10px; color: var(--text-3); margin-top: 2px; font-style: italic; }

/* ---------- Branched lanes (사업부장 / 담당) ---------- */
.l1-lanes, .l2-lanes {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 100%;
}
.cell-l1, .cell-l2 {
  position: relative;
  padding: 0 !important;
}
.cell-l1 > .l1-lanes, .cell-l2 > .l2-lanes {
  padding: 10px 14px;
}
.lane-main {
  display: flex;
  align-items: flex-start;
  width: calc(50% - 8px);
}
.l1-lanes-solo > .lane-main, .l2-lanes-solo > .lane-main { width: 100%; }
.l1-lanes > .lane-main { padding-right: 8px; }
.l2-lanes > .lane-main { padding-right: 8px; }
.lane-branch {
  position: absolute;
  right: 14px;
  width: calc(50% - 14px);
  display: flex;
  align-items: flex-start;
  padding: 8px 0 8px 12px;
  border-left: 1.5px dashed var(--border-strong);
}
.lane-branch::before {
  content: '';
  position: absolute;
  left: -5px;
  top: 50%;
  width: 7px;
  height: 7px;
  background: var(--border-strong);
  border-radius: 50%;
  transform: translateY(-50%);
}
.lane-branch.is-vacant { opacity: 0.7; }
.leader-vacant { color: var(--muted); font-weight: 500; font-size: 12px; }

mark { background: oklch(0.92 0.10 95); color: var(--text); padding: 0 1px; border-radius: 2px; }

/* ---------- Editable ---------- */
.edit-mode .editable {
  display: inline-block;
  min-width: 24px;
  padding: 0 4px;
  margin: 0 -4px;
  border-radius: 4px;
  outline: 1px dashed var(--border-strong);
  outline-offset: 1px;
  cursor: text;
  transition: outline-color 0.12s, background 0.12s;
}
.edit-mode .editable:hover { outline-color: var(--accent); background: var(--accent-soft); }
.edit-mode .editable.is-editing { outline: 2px solid var(--accent); background: var(--surface); }
.edit-mode .editable.is-empty::before {
  content: attr(data-placeholder);
  color: var(--muted);
  font-weight: 400;
  font-size: 11px;
}
.edit-mode .leader-add { opacity: 0.6; }

/* ---------- Grid View ---------- */
.grid-view {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
}
.card-bonbu {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-sm);
}
.card-bonbu-head {
  padding: 16px 18px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; gap: 16px;
}
.card-bonbu-title { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
.card-bonbu-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.card-bonbu-l1 { text-align: right; }
.card-l1-label {
  font-size: 10px; font-weight: 600; color: var(--l1);
  margin-bottom: 2px; letter-spacing: 0.02em;
}
.card-l1-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.card-l1-name.muted { color: var(--muted); }
.card-l1-rank { font-size: 11px; color: var(--text-3); font-weight: 400; margin-left: 4px; }
.card-sub-note { font-size: 10px; color: var(--text-3); font-style: italic; margin-top: 1px; }

.card-sils { padding: 8px 0; }
.card-sil { padding: 12px 18px; border-top: 1px solid var(--border); }
.card-sil:first-child { border-top: 0; }
.card-sil-head { margin-bottom: 6px; }
.card-sil-name {
  font-size: 13px; font-weight: 600; letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 6px;
}
.card-sil.is-direct .card-sil-name { font-style: italic; color: var(--text-2); }
.card-sil-l2 {
  font-size: 11px; color: var(--text-2); margin-top: 2px;
  display: flex; align-items: center; gap: 5px;
}
.dot { width: 5px; height: 5px; border-radius: 50%; }
.muted { color: var(--text-3); }

.card-teams { list-style: none; padding: 0; margin: 8px 0 0; display: grid; gap: 4px; }
.card-teams li {
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  padding: 6px 10px; border-radius: 5px;
  background: var(--surface-2);
  font-size: 12px;
}
.card-team-name { color: var(--text-2); font-weight: 500; display: flex; align-items: center; gap: 8px; }
.card-team-cnt {
  font-size: 10px; font-weight: 600;
  padding: 1px 6px;
  background: var(--surface);
  color: var(--text-2);
  border-radius: 8px;
  font-variant-numeric: tabular-nums;
}
.card-team-l3 {
  display: flex; align-items: center; gap: 5px;
  color: var(--text); font-weight: 600;
}

/* ---------- Stat tones ---------- */
.stat-l1 .stat-value { color: var(--l1); }
.stat-l2 .stat-value { color: var(--l2); }
.stat-l3 .stat-value { color: var(--l3); }

/* ---------- Exclusions Modal ---------- */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(20, 18, 14, 0.45);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: grid; place-items: center;
  padding: 32px;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 100%;
  max-width: 920px;
  max-height: 86vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  overflow: hidden;
}
.modal-head {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 16px;
}
.modal-title {
  font-size: 16px; font-weight: 600;
  letter-spacing: -0.02em; color: var(--text);
}
.modal-sub { font-size: 12px; color: var(--text-3); margin-top: 4px; }
.modal-close {
  all: unset; cursor: pointer;
  width: 32px; height: 32px;
  border-radius: 6px; display: grid; place-items: center;
  font-size: 22px; color: var(--text-3);
  font-weight: 300;
}
.modal-close:hover { background: var(--surface-2); color: var(--text); }

.modal-body {
  display: grid;
  grid-template-columns: 220px 1fr;
  flex: 1;
  min-height: 0;
}
.modal-tabs {
  border-right: 1px solid var(--border);
  background: var(--surface-2);
  padding: 8px;
  display: flex; flex-direction: column;
  gap: 1px;
  overflow-y: auto;
}
.modal-tab {
  all: unset; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--text-2);
  font-weight: 500;
  transition: background 0.12s, color 0.12s;
}
.modal-tab:hover { background: var(--surface); color: var(--text); }
.modal-tab.is-active {
  background: var(--text);
  color: var(--surface);
}
.modal-tab.is-active .modal-tab-count { color: rgba(255,255,255,0.7); }
.modal-tab-count {
  font-size: 11px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}
.modal-tab-group { display: flex; flex-direction: column; gap: 1px; margin-bottom: 8px; }
.modal-tab-group:last-child { margin-bottom: 0; }
.modal-tab-group-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-3);
  padding: 8px 12px 4px;
  text-transform: uppercase;
}

.modal-content {
  padding: 18px 24px 24px;
  overflow-y: auto;
}
.modal-section-head {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 4px;
}
.modal-section-title {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.modal-section-meta {
  font-size: 12px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}
.modal-section-note {
  margin: 0 0 16px;
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.5;
}

.modal-empty {
  padding: 40px 20px;
  text-align: center;
  background: var(--surface-2);
  border-radius: 8px;
  color: var(--text-3);
  font-size: 13px;
}
.modal-empty-icon {
  font-size: 32px;
  color: var(--muted);
  margin-bottom: 8px;
}
.modal-empty-sub {
  font-size: 11px;
  margin-top: 4px;
  color: var(--muted);
}

.modal-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.modal-table th {
  text-align: left;
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.02em;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
  position: sticky; top: 0;
}
.modal-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
}
.modal-table tbody tr:hover td { background: var(--surface-2); }
.modal-tnum {
  color: var(--text-3) !important;
  font-variant-numeric: tabular-nums;

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

const ORG_INITIAL = window.ORG_DATA;
const EXCLUSION_DATA = window.EXCLUSION_DATA || {};
const EXCLUSION_META = window.EXCLUSION_META || {};
const STORAGE_KEY = 'org-data-v13';
const EXCLUSION_KEYS = ['대표이사', '자문역', '고문역', '사외이사', '컨틴전시플랜팀', '컨틴전시플랜팀(예비군대대)', '본사사옥', 'English Lab', '파견처', '비상근'];

// ---------- Persistence ----------
function loadOrg() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return JSON.parse(JSON.stringify(ORG_INITIAL));
}
function saveOrg(org) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(org)); } catch (e) {}
}

// ---------- Helpers ----------
function countTeams(b) { return b.sils.reduce((a, s) => a + s.teams.length, 0); }
function countSils(b) { return b.sils.filter(s => !s.directTeam).length; }
function countMembers(b) {
  // Prefer real per-bonbu total from raw data (includes leaders + staff)
  if (b.stats && typeof b.stats.total === 'number') return b.stats.total;
  return b.sils.reduce((a, s) => a + s.teams.reduce((x, t) => x + (t.memberCount || 0), 0), 0);
}
function countLeaders(org) {
  let l1 = 0, l2 = 0, l3 = 0;
  for (const b of org) {
    if (b.leader1?.name) l1++;
    if (b.subLeaders) l1 += b.subLeaders.filter(s => s?.name).length;
    for (const s of b.sils) {
      if (s.leader2?.name) l2++;
      for (const t of s.teams) if (t.leader3?.name) l3++;
    }
  }
  return { l1, l2, l3 };
}

// ---------- App ----------
function App() {
  const [org, setOrg] = useState(loadOrg);
  const [activeBonbu, setActiveBonbu] = useState('ALL');
  const [query, setQuery] = useState('');
  const [view, setView] = useState('table');
  const [editMode, setEditMode] = useState(false);
  const [showExclusions, setShowExclusions] = useState(false);
  const headerRef = useRef(null);

  useEffect(() => { saveOrg(org); }, [org]);

  // Dynamically measure header height so the sticky table head sits right below it
  useEffect(() => {
    const update = () => {
      const h = headerRef.current?.getBoundingClientRect().height || 78;
      document.documentElement.style.setProperty('--header-h', Math.round(h) + 'px');
    };
    update();
    const ro = new ResizeObserver(update);
    if (headerRef.current) ro.observe(headerRef.current);
    window.addEventListener('resize', update);
    return () => { ro.disconnect(); window.removeEventListener('resize', update); };
  }, []);

  const stats = useMemo(() => {
    const lc = countLeaders(org);
    return {
      bonbu: org.length,
      sil: org.reduce((a, b) => a + countSils(b), 0),
      team: org.reduce((a, b) => a + countTeams(b), 0),
      members: org.reduce((a, b) => a + countMembers(b), 0),
      l1: lc.l1, l2: lc.l2, l3: lc.l3,
    };
  }, [org]);

  const filtered = useMemo(() => {
    let data = org;
    if (activeBonbu !== 'ALL') data = data.filter(b => b.bonbu === activeBonbu);
    if (!query.trim()) return data;
    const q = query.trim().toLowerCase();
    return data.map(b => {
      const matchStr = (s) => s && s.toLowerCase().includes(q);
      const bonbuMatch = matchStr(b.bonbu) || matchStr(b.leader1?.name) || (b.subLeaders || []).some(sl => matchStr(sl.name));
      const sils = b.sils.map(s => {
        const silMatch = matchStr(s.sil) || matchStr(s.leader2?.name);
        const teams = s.teams.filter(t => matchStr(t.team) || matchStr(t.leader3?.name));
        if (silMatch) return s;
        if (teams.length) return { ...s, teams };
        return null;
      }).filter(Boolean);
      if (bonbuMatch) return b;
      if (sils.length) return { ...b, sils };
      return null;
    }).filter(Boolean);
  }, [activeBonbu, query, org]);

  const updateOrg = useCallback((mutator) => {
    setOrg(prev => {
      const copy = JSON.parse(JSON.stringify(prev));
      mutator(copy);
      return copy;
    });
  }, []);

  const handleReset = () => {
    if (confirm('모든 편집 내용을 초기화하시겠습니까?')) {
      localStorage.removeItem(STORAGE_KEY);
      setOrg(JSON.parse(JSON.stringify(ORG_INITIAL)));
    }
  };

  return (
    <div className={'app ' + (editMode ? 'edit-mode' : '')}>
      <Sidebar org={org} active={activeBonbu} onPick={setActiveBonbu} stats={stats} />
      <main className="main">
        <Header
          headerRef={headerRef}
          query={query} setQuery={setQuery}
          view={view} setView={setView}
          stats={stats} active={activeBonbu}
          editMode={editMode} setEditMode={setEditMode}
          onReset={handleReset}
          onShowExclusions={() => setShowExclusions(true)}
          org={org}
        />
        <div className="content">
          {view === 'table' ? (
            <TableView org={filtered} highlight={query.trim().toLowerCase()} editMode={editMode} updateOrg={updateOrg} />
          ) : (
            <GridView org={filtered} highlight={query.trim().toLowerCase()} />
          )}
          {filtered.length === 0 && <div className="empty">검색 결과가 없습니다.</div>}
        </div>
        {showExclusions && <ExclusionsModal onClose={() => setShowExclusions(false)} />}
        <Footer stats={stats} />
      </main>
    </div>
  );
}

// ---------- Sidebar ----------

          <input type="text" placeholder="이름·부서·팀 검색" value={query} onChange={e => setQuery(e.target.value)} />

          제외항목
        </button>
        <button className={'btn-ghost ' + (editMode ? 'is-on' : '')} onClick={() => setEditMode(v => !v)}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="m18.5 2.5 3 3L12 15l-4 1 1-4Z" /></svg>
          {editMode ? '편집 종료' : '편집'}

          엑셀 다운로드
        </button>
      </div>

}

// ---------- Editable text ----------
function Editable({ value, onChange, editMode, placeholder, multi }) {
  const ref = useRef(null);
  const [editing, setEditing] = useState(false);

  if (!editMode) return <>{value || placeholder || ''}</>;

  return (
    <span
      ref={ref}
      contentEditable
      suppressContentEditableWarning
      className={'editable ' + (editing ? 'is-editing' : '') + (!value ? ' is-empty' : '')}
      data-placeholder={placeholder || ''}
      onFocus={() => setEditing(true)}
      onBlur={(e) => {
        setEditing(false);
        const t = e.currentTarget.innerText.trim();
        if (t !== (value || '')) onChange(t);
      }}
      onKeyDown={(e) => {
        if (!multi && e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); }
        if (e.key === 'Escape') { e.currentTarget.innerText = value || ''; e.currentTarget.blur(); }
      }}
    >
      {value || ''}
    </span>
  );
}

// ---------- Hi ----------
function Hi({ text, q }) {
  if (!q || !text) return <>{text}</>;
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return <>{text}</>;
  return <>{text.slice(0, idx)}<mark>{text.slice(idx, idx + q.length)}</mark>{text.slice(idx + q.length)}</>;
}

// ---------- Leader cell ----------
function LeaderCell({ leader, q, kind, fallback = '—', editMode, onChangeName, onChangeRank, onChangeTitle }) {
  if (!leader || !leader.name) {
    if (editMode) {
      return (
        <div className="leader leader-add">
          <span className={'leader-dot dot-' + kind} />
          <div className="leader-text">
            <div className="leader-name">
              <Editable value="" placeholder="+ 성명 추가" editMode={editMode} onChange={(v) => v && onChangeName?.(v)} />
            </div>
          </div>
        </div>
      );
    }
    return <span className="leader-empty">{fallback}</span>;
  }
  return (
    <div className="leader">
      <span className={'leader-dot dot-' + kind} />
      <div className="leader-text">
        <div className="leader-name">
          {editMode ? <Editable value={leader.name} editMode={editMode} placeholder="성명" onChange={onChangeName} /> : <Hi text={leader.name} q={q} />}
        </div>
        {(leader.rank || editMode) && (
          <div className="leader-rank">
            {editMode ? <Editable value={leader.rank || ''} editMode={editMode} placeholder="직급" onChange={onChangeRank} /> : leader.rank}
          </div>
        )}
        {leader.title && onChangeTitle && (
          <div className="leader-rank">
            {editMode ? <Editable value={leader.title} editMode={editMode} placeholder="직책" onChange={onChangeTitle} /> : leader.title}
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- Branched L1 / Sectioned L2 ----------
function BranchedL1Cell({ bonbu, totalRows, q, editMode, onChangeL1Name, onChangeL1Rank, trRefs, silRowMap }) {
  const branches = bonbu.branchLeaders || [];
  const wrapperRef = useRef(null);
  const [positions, setPositions] = useState([]);

  useEffect(() => {
    if (branches.length === 0) return;
    const compute = () => {
      if (!wrapperRef.current) return;
      const wrapperRect = wrapperRef.current.getBoundingClientRect();
      const ps = branches.map(br => {
        const ranges = br.sils.map(sn => silRowMap[sn]).filter(Boolean);
        if (ranges.length === 0) return null;
        const start = Math.min(...ranges.map(r => r[0]));
        const end = Math.max(...ranges.map(r => r[1]));
        const startTr = trRefs.current[start];
        const endTr = trRefs.current[end];
        if (!startTr || !endTr) return null;
        const sRect = startTr.getBoundingClientRect();
        const eRect = endTr.getBoundingClientRect();
        return { top: sRect.top - wrapperRect.top, height: eRect.bottom - sRect.top };
      });
      setPositions(ps);
    };
    compute();
    const ro = new ResizeObserver(compute);
    trRefs.current.forEach(tr => tr && ro.observe(tr));
    if (wrapperRef.current) ro.observe(wrapperRef.current);
    window.addEventListener('resize', compute);
    return () => { ro.disconnect(); window.removeEventListener('resize', compute); };
  }, [branches.length, totalRows]);

  if (branches.length === 0) {
    return (
      <div className="l1-lanes l1-lanes-solo">
        <div className="lane-main lane-l1-main">
          <LeaderCell leader={bonbu.leader1} q={q} kind="l1" editMode={editMode}
            onChangeName={onChangeL1Name} onChangeRank={onChangeL1Rank} />
        </div>
      </div>
    );
  }
  return (
    <div ref={wrapperRef} className="l1-lanes">
      <div className="lane-main lane-l1-main">
        <LeaderCell leader={bonbu.leader1} q={q} kind="l1" editMode={editMode}
          onChangeName={onChangeL1Name} onChangeRank={onChangeL1Rank} />
      </div>
      {branches.map((br, j) => {
        const p = positions[j];
        return (
          <div key={j} className="lane-branch lane-l1-branch"
            style={p ? { top: `${p.top}px`, height: `${p.height}px` } : { display: 'none' }}>
            <div className="leader">
              <span className="leader-dot dot-l1" />
              <div className="leader-text">
                <div className="leader-name"><Hi text={br.name} q={q} /></div>
                <div className="leader-rank">{br.rank}</div>
                <div className="sub-leader-note">{br.title}{br.branch ? ` (${br.branch})` : ''}</div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function SectionedL2Cell({ sil, totalRows, q, editMode, onChangeL2Name, onChangeL2Rank, trRefs, silStartIdx }) {
  const definedSections = sil.sections || [];
  const wrapperRef = useRef(null);
  const [positions, setPositions] = useState([]);

  // Build full sections list — include synthetic '공석' sections for teams not in any defined section
  const sectionedTeamSet = new Set();
  for (const s of definedSections) for (const tn of s.teamNames) sectionedTeamSet.add(tn);
  const orphanTeams = sil.teams.filter(t => !sectionedTeamSet.has(t.team));
  const allSections = [...definedSections];
  for (const t of orphanTeams) {
    allSections.push({ name: '', leader: { name: '공석', rank: '' }, teamNames: [t.team], _placeholder: true });
  }

  const teamRowMap = {};
  sil.teams.forEach((t, idx) => { teamRowMap[t.team] = silStartIdx + idx; });

  useEffect(() => {
    if (allSections.length === 0) return;
    const compute = () => {
      if (!wrapperRef.current) return;
      const wrapperRect = wrapperRef.current.getBoundingClientRect();
      const ps = allSections.map(sec => {
        const idxs = sec.teamNames.map(tn => teamRowMap[tn]).filter(v => v != null);
        if (idxs.length === 0) return null;
        const start = Math.min(...idxs);
        const end = Math.max(...idxs);
        const startTr = trRefs.current[start];
        const endTr = trRefs.current[end];
        if (!startTr || !endTr) return null;
        const sRect = startTr.getBoundingClientRect();
        const eRect = endTr.getBoundingClientRect();
        return { top: sRect.top - wrapperRect.top, height: eRect.bottom - sRect.top };
      });
      setPositions(ps);
    };
    compute();
    const ro = new ResizeObserver(compute);
    trRefs.current.forEach(tr => tr && ro.observe(tr));
    if (wrapperRef.current) ro.observe(wrapperRef.current);
    window.addEventListener('resize', compute);
    return () => { ro.disconnect(); window.removeEventListener('resize', compute); };
  }, [allSections.length, totalRows, silStartIdx]);

  if (definedSections.length === 0) {
    return (
      <div className="l2-lanes l2-lanes-solo">
        <div className="lane-main lane-l2-main">
          <LeaderCell leader={sil.leader2} q={q} kind="l2" fallback="공석" editMode={editMode}
            onChangeName={onChangeL2Name} onChangeRank={onChangeL2Rank} />
        </div>
      </div>
    );
  }
  return (
    <div ref={wrapperRef} className="l2-lanes">
      <div className="lane-main lane-l2-main">
        <LeaderCell leader={sil.leader2} q={q} kind="l2" fallback="공석" editMode={editMode}
          onChangeName={onChangeL2Name} onChangeRank={onChangeL2Rank} />
      </div>
      {allSections.map((sec, j) => {
        const p = positions[j];
        return (
          <div key={j} className={'lane-branch lane-l2-branch' + (sec._placeholder ? ' is-vacant' : '')}
            style={p ? { top: `${p.top}px`, height: `${p.height}px` } : { display: 'none' }}>
            {sec._placeholder ? (
              <div className="leader">
                <span className="leader-dot dot-l2" style={{opacity: 0.4}} />
                <div className="leader-text">
                  <div className="leader-name leader-vacant">공석</div>
                </div>
              </div>
            ) : (
              <div className="leader">
                <span className="leader-dot dot-l1" />
                <div className="leader-text">
                  <div className="leader-name"><Hi text={sec.leader.name} q={q} /></div>
                  <div className="leader-rank">{sec.leader.rank}</div>
                  <div className="sub-leader-note">{sec.name}</div>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ---------- Table view ----------
function TableView({ org, highlight, editMode, updateOrg }) {
  return (
    <div className="table-wrap">
      <table className="org-table">
        <colgroup>
          <col style={{ width: '14%' }} />
          <col style={{ width: '13%' }} />
          <col style={{ width: '17%' }} />
          <col style={{ width: '6%' }} />
          <col style={{ width: '16.5%' }} />
          <col style={{ width: '16.5%' }} />
          <col style={{ width: '17%' }} />
        </colgroup>
        <thead>
          <tr>
            <th>본부 / 사업부</th>
            <th>실</th>
            <th>팀</th>
            <th className="th-center">인원</th>
            <th><span className="th-chip chip-l1">리더 1</span><span className="th-sub">본부장·사업부장·원장·단장·담당</span></th>
            <th><span className="th-chip chip-l2">리더 2</span><span className="th-sub">실장 · Center장</span></th>
            <th><span className="th-chip chip-l3">리더 3</span><span className="th-sub">팀장 · 팀장(S)</span></th>
          </tr>
        </thead>
        <tbody>
          {org.map(b => <BonbuRows key={b.bonbu} b={b} highlight={highlight} editMode={editMode} updateOrg={updateOrg} />)}
        </tbody>
      </table>
    </div>
  );
}

function BonbuRows({ b, highlight, editMode, updateOrg }) {
  const teamRows = [];
  b.sils.forEach(s => s.teams.forEach((t, ti) => teamRows.push({ s, t, firstOfSil: ti === 0, silCount: s.teams.length })));
  const totalRows = Math.max(teamRows.length, 1);

  const trRefs = useRef([]);
  trRefs.current.length = totalRows;

  // Map sil -> [startRow, endRow] absolute team-row indices within this bonbu
  const silRowMap = {};
  const silStartMap = {};
  {
    let idx = 0;
    for (const s of b.sils) {
      silRowMap[s.sil] = [idx, idx + s.teams.length - 1];
      silStartMap[s.sil] = idx;
      idx += s.teams.length;
    }
  }

  const setBonbu = (path, value) => updateOrg(o => {
    const bb = o.find(x => x.bonbu === b.bonbu);
    let cur = bb;
    for (let i = 0; i < path.length - 1; i++) cur = cur[path[i]];
    cur[path[path.length - 1]] = value;
  });
  const setTeam = (silIdx, teamIdx, key, value) => updateOrg(o => {
    const bb = o.find(x => x.bonbu === b.bonbu);
    if (!bb.sils[silIdx].teams[teamIdx][key] && key === 'leader3') bb.sils[silIdx].teams[teamIdx][key] = { name: '', rank: '' };
    if (key === 'team') bb.sils[silIdx].teams[teamIdx].team = value;
    else if (key.startsWith('leader3.')) {
      if (!bb.sils[silIdx].teams[teamIdx].leader3) bb.sils[silIdx].teams[teamIdx].leader3 = { name: '', rank: '' };
      bb.sils[silIdx].teams[teamIdx].leader3[key.split('.')[1]] = value;
    } else if (key === 'memberCount') bb.sils[silIdx].teams[teamIdx].memberCount = parseInt(value) || 0;
  });
  const setSil = (silIdx, key, value) => updateOrg(o => {
    const bb = o.find(x => x.bonbu === b.bonbu);
    if (key === 'sil') bb.sils[silIdx].sil = value;
    else if (key.startsWith('leader2.')) {
      if (!bb.sils[silIdx].leader2) bb.sils[silIdx].leader2 = { name: '', rank: '' };
      bb.sils[silIdx].leader2[key.split('.')[1]] = value;
    }
  });
  const setL1 = (key, value) => updateOrg(o => {
    const bb = o.find(x => x.bonbu === b.bonbu);
    if (!bb.leader1) bb.leader1 = { name: '', title: '', rank: '' };
    bb.leader1[key] = value;
  });

  const findSilIdx = (silName) => b.sils.findIndex(s => s.sil === silName);
  const findTeamIdx = (silName, teamName) => b.sils.find(s => s.sil === silName).teams.findIndex(t => t.team === teamName);

  if (teamRows.length === 0) {
    return (
      <tr className="row-bonbu-only bonbu-start">
        <td className="cell-bonbu"><BonbuCellContent b={b} q={highlight} /></td>
        <td colSpan={3} className="cell-empty">—</td>
        <td><LeaderCell leader={b.leader1} q={highlight} kind="l1" editMode={editMode}
          onChangeName={(v) => setL1('name', v)}
          onChangeRank={(v) => setL1('rank', v)} /></td>
        <td className="cell-empty">—</td>
        <td className="cell-empty">—</td>
      </tr>
    );
  }

  return (
    <>
      {teamRows.map((r, i) => {
        const isBonbuFirst = i === 0;
        const isSilFirst = r.firstOfSil;
        const silIdx = findSilIdx(r.s.sil);
        const teamIdx = findTeamIdx(r.s.sil, r.t.team);
        return (
          <tr key={i} ref={el => trRefs.current[i] = el} className={(isBonbuFirst ? 'bonbu-start ' : '') + (isSilFirst ? 'sil-start' : '')}>
            {isBonbuFirst && (
              <td className="cell-bonbu" rowSpan={totalRows}>
                <BonbuCellContent b={b} q={highlight} editMode={editMode} onChange={(v) => setBonbu(['bonbu'], v)} />
              </td>
            )}
            {isSilFirst && (
              <td className="cell-sil" rowSpan={r.silCount}>
                <div className={'sil-name' + (r.s.directTeam ? ' is-direct' : '')}>
                  {editMode ? <Editable value={r.s.sil} editMode={editMode} onChange={(v) => setSil(silIdx, 'sil', v)} placeholder="실 이름" /> : <Hi text={r.s.sil} q={highlight} />}
                  {r.s.directTeam && <span className="badge-direct">직속</span>}
                </div>
              </td>
            )}
            <td className="cell-team">
              <div className="team-name">
                {editMode ? <Editable value={r.t.team} editMode={editMode} onChange={(v) => setTeam(silIdx, teamIdx, 'team', v)} placeholder="팀 이름" /> : <Hi text={r.t.team} q={highlight} />}
              </div>
            </td>
            <td className="cell-count">
              {editMode ? (
                <Editable value={String(r.t.memberCount || 0)} editMode={editMode} onChange={(v) => setTeam(silIdx, teamIdx, 'memberCount', v)} placeholder="0" />
              ) : (
                <span className="member-count">{r.t.memberCount || 0}</span>
              )}
            </td>
            {isBonbuFirst && (
              <td className="cell-l1" rowSpan={totalRows}>
                <BranchedL1Cell
                  bonbu={b}
                  totalRows={totalRows}
                  q={highlight}
                  editMode={editMode}
                  onChangeL1Name={(v) => setL1('name', v)}
                  onChangeL1Rank={(v) => setL1('rank', v)}
                  trRefs={trRefs}
                  silRowMap={silRowMap}
                />
                {b.subLeaders && b.subLeaders.map((sl, j) => (
                  <div key={j} className="sub-leader">
                    <div className="leader">
                      <span className="leader-dot dot-l1" />
                      <div className="leader-text">
                        <div className="leader-name">
                          {editMode ? <Editable value={sl.name} editMode={editMode} onChange={(v) => updateOrg(o => { o.find(x => x.bonbu === b.bonbu).subLeaders[j].name = v; })} /> : <Hi text={sl.name} q={highlight} />}
                        </div>
                        <div className="leader-rank">{sl.rank}</div>
                        <div className="sub-leader-note">{sl.title}</div>
                      </div>
                    </div>
                  </div>
                ))}
              </td>
            )}
            {isSilFirst && (
              <td className="cell-l2" rowSpan={r.silCount}>
                <SectionedL2Cell
                  sil={r.s}
                  totalRows={r.silCount}
                  q={highlight}
                  editMode={editMode}
                  onChangeL2Name={(v) => setSil(silIdx, 'leader2.name', v)}
                  onChangeL2Rank={(v) => setSil(silIdx, 'leader2.rank', v)}
                  trRefs={trRefs}
                  silStartIdx={silStartMap[r.s.sil]}
                />
              </td>
            )}
            <td className="cell-l3">
              <LeaderCell leader={r.t.leader3} q={highlight} kind="l3" fallback="공석" editMode={editMode}
                onChangeName={(v) => setTeam(silIdx, teamIdx, 'leader3.name', v)}
                onChangeRank={(v) => setTeam(silIdx, teamIdx, 'leader3.rank', v)} />
            </td>
          </tr>
        );
      })}
    </>
  );
}

function BonbuCellContent({ b, q, editMode, onChange }) {
  const teamN = countTeams(b);
  const silN = countSils(b);
  const mem = countMembers(b);
  const st = b.stats || { l1: 0, l2: 0, l3: 0, staff: 0 };
  return (
    <div className="bonbu-cell">
      <div className="bonbu-name">
        {editMode ? <Editable value={b.bonbu} editMode={editMode} onChange={onChange} /> : <Hi text={b.bonbu} q={q} />}
      </div>
      <div className="bonbu-meta">
        <span>{silN}실</span>
        <span className="dot-sep">·</span>
        <span>{teamN}팀</span>
        <span className="dot-sep">·</span>
        <span>{mem}명</span>
      </div>
      <div className="bonbu-breakdown">
        <span className="bb-l1">리더 1 {st.l1}명</span>
        <span className="bb-sep">,</span>
        <span className="bb-l2">리더 2 {st.l2}명</span>
        <span className="bb-sep">,</span>
        <span className="bb-l3">리더 3 {st.l3}명</span>
        <span className="bb-sep">,</span>
        <span className="bb-staff">직원 {st.staff}명</span>
      </div>
    </div>
  );
}

// ---------- Grid View ----------
function GridView({ org, highlight }) {
  return (
    <div className="grid-view">
      {org.map(b => (
        <section key={b.bonbu} className="card-bonbu">
          <div className="card-bonbu-head">
            <div>
              <div className="card-bonbu-title"><Hi text={b.bonbu} q={highlight} /></div>
              <div className="card-bonbu-meta">{countSils(b)}실 · {countTeams(b)}팀 · {countMembers(b)}명</div>
            </div>
            <div className="card-bonbu-l1">
              <div className="card-l1-label">리더 1</div>
              {b.leader1 ? (
                <div className="card-l1-name"><Hi text={b.leader1.name} q={highlight} /> <span className="card-l1-rank">{b.leader1.rank}</span></div>
              ) : <div className="card-l1-name muted">—</div>}
              {b.subLeaders && b.subLeaders.map((sl, j) => (
                <div className="card-l1-name" key={j} style={{ marginTop: 4 }}>
                  <Hi text={sl.name} q={highlight} /> <span className="card-l1-rank">{sl.rank}</span>
                  <div className="card-sub-note">{sl.title}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="card-sils">
            {b.sils.map(s => (
              <div key={s.sil} className={'card-sil' + (s.directTeam ? ' is-direct' : '')}>
                <div className="card-sil-head">
                  <div>
                    <div className="card-sil-name">
                      <Hi text={s.sil} q={highlight} />
                      {s.directTeam && <span className="badge-direct">직속</span>}
                    </div>
                    <div className="card-sil-l2">
                      <span className="dot dot-l2" /> 실장 ·{' '}
                      {s.leader2 ? <><Hi text={s.leader2.name} q={highlight} /> <span className="muted">{s.leader2.rank}</span></> : <span className="muted">공석</span>}
                    </div>
                  </div>
                </div>
                <ul className="card-teams">
                  {s.teams.map(t => (
                    <li key={t.team}>
                      <span className="card-team-name">
                        <Hi text={t.team} q={highlight} />
                        <span className="card-team-cnt">{t.memberCount || 0}</span>
                      </span>
                      <span className="card-team-l3">
                        <span className="dot dot-l3" />
                        {t.leader3 ? <Hi text={t.leader3.name} q={highlight} /> : <span className="muted">공석</span>}
                      </span>
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </section>
      ))}
    </div>
  );
}

// ---------- Exclusions Modal ----------
function ExclusionsModal({ onClose }) {
  const [active, setActive] = useState(EXCLUSION_KEYS[0]);
  const list = EXCLUSION_DATA[active] || [];
  const meta = EXCLUSION_META[active] || {};
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  // Group keys for sidebar
  const groups = {};
  for (const k of EXCLUSION_KEYS) {
    const g = (EXCLUSION_META[k]?.group) || '기타';
    if (!groups[g]) groups[g] = [];
    groups[g].push(k);
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <div className="modal-title">본 명단에서 제외된 항목</div>
            <div className="modal-sub">아래 기준에 해당하는 직원은 본 리더 명단에서 제외되었습니다.</div>
          </div>
          <button className="modal-close" onClick={onClose} aria-label="close">×</button>
        </div>
        <div className="modal-body">
          <div className="modal-tabs">
            {Object.entries(groups).map(([g, keys]) => (
              <div className="modal-tab-group" key={g}>
                <div className="modal-tab-group-label">{g}</div>
                {keys.map(k => {
                  const n = (EXCLUSION_DATA[k] || []).length;
                  return (
                    <button key={k} className={'modal-tab ' + (active === k ? 'is-active' : '')} onClick={() => setActive(k)}>
                      <span className="modal-tab-name">{k}</span>
                      <span className="modal-tab-count">{n || '—'}</span>
                    </button>
                  );
                })}
              </div>
            ))}
          </div>
          <div className="modal-content">
            <div className="modal-section-head">
              <h3 className="modal-section-title">{active}</h3>
              <div className="modal-section-meta">{list.length}명</div>
            </div>
            {meta.criteria && <p className="modal-section-note">대상 기준: {meta.criteria}</p>}
            {list.length === 0 ? (
              <div className="modal-empty">
                <div className="modal-empty-icon">—</div>
                <div>원본 직원명단(2026-05-18 기준)에서 이미 제외된 항목입니다.</div>
                <div className="modal-empty-sub">별도 명단이 필요하면 exclusions.js 파일에서 추가해 주세요.</div>
              </div>
            ) : (
              <table className="modal-table">
                <thead>
                  <tr>
                    <th style={{ width: 60 }}>#</th>
                    <th>성명</th>
                    <th>직위</th>
                    <th>소속</th>
                  </tr>
                </thead>
                <tbody>
                  {list.map((p, i) => (
                    <tr key={i}>
                      <td className="modal-tnum">{i + 1}</td>
                      <td className="modal-tname">{p.name}</td>
                      <td>{p.rank || '—'}</td>
                      <td className="modal-tdept">{p.dept || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- Footer ----------
function Footer({ stats }) {
  return (
    <footer className="footer">
      <div className="footer-stats">
        <Stat label="본부/사업부" value={stats.bonbu} />
        <Stat label="실" value={stats.sil} />
        <Stat label="팀" value={stats.team} />
        <Stat label="리더 1" value={stats.l1} tone="l1" />
        <Stat label="리더 2" value={stats.l2} tone="l2" />
        <Stat label="리더 3" value={stats.l3} tone="l3" />
        <Stat label="직원수" value={stats.members.toLocaleString()} />
      </div>
      <div className="footer-note">자료 출처: 직원명단 (260518 기준) · 근무지구분=본사 · 제외 항목은 상단 [제외항목] 버튼 참고</div>
    </footer>
  );
}
function Stat({ label, value, tone }) {
  return (
    <div className={'stat ' + (tone ? 'stat-' + tone : '')}>
      <div className="stat-value">{value}</div>
      <div className="stat-label">{label}</div>
    </div>
  );
}

// ---------- Excel Export ----------
async function exportExcel(org) {
  // Load SheetJS if not loaded
  if (!window.XLSX) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  const XLSX = window.XLSX;

  const aoa = [['본부 / 사업부', '실', '팀', '인원', '리더 1 (본부장·사업부장·원장·단장·담당·대표이사)', '리더 2 (실장)', '리더 3 (팀장)']];
  const merges = [];
  let row = 1;
  for (const b of org) {
    const bonbuStart = row;
    let l1 = '';
    if (b.leader1) l1 = `${b.leader1.name} (${b.leader1.title}, ${b.leader1.rank})`;
    if (b.subLeaders) for (const sl of b.subLeaders) l1 += (l1 ? '\n' : '') + `${sl.name} (${sl.title}, ${sl.rank})`;
    if (!l1) l1 = '—';
    const teamRows = [];
    for (const s of b.sils) s.teams.forEach((t, ti) => teamRows.push({ s, t, firstOfSil: ti === 0, silCount: s.teams.length }));
    if (teamRows.length === 0) {
      aoa.push([b.bonbu, '—', '—', 0, l1, '—', '—']);
      row++;
      continue;
    }
    teamRows.forEach((r, i) => {
      aoa.push([
        i === 0 ? b.bonbu : '',
        r.firstOfSil ? (r.s.directTeam ? r.s.sil + ' (직속)' : r.s.sil) : '',
        r.t.team,
        r.t.memberCount || 0,
        i === 0 ? l1 : '',
        r.firstOfSil ? (r.s.leader2 ? `${r.s.leader2.name} (${r.s.leader2.rank})` : '공석') : '',
        r.t.leader3 ? `${r.t.leader3.name} (${r.t.leader3.rank})` : '공석',
      ]);
      if (r.firstOfSil && r.silCount > 1) {
        merges.push({ s: { r: row, c: 1 }, e: { r: row + r.silCount - 1, c: 1 } });
        merges.push({ s: { r: row, c: 5 }, e: { r: row + r.silCount - 1, c: 5 } });
      }
      row++;
    });
    if (teamRows.length > 1) {
      merges.push({ s: { r: bonbuStart, c: 0 }, e: { r: bonbuStart + teamRows.length - 1, c: 0 } });
      merges.push({ s: { r: bonbuStart, c: 4 }, e: { r: bonbuStart + teamRows.length - 1, c: 4 } });
    }
  }
  // Total row
  const total = org.reduce((a, b) => a + countMembers(b), 0);
  aoa.push([]);
  aoa.push(['합계', '', '', total, '', '', '']);

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges'] = merges;
  ws['!cols'] = [{ wch: 22 }, { wch: 22 }, { wch: 26 }, { wch: 8 }, { wch: 38 }, { wch: 22 }, { wch: 22 }];

  // Styles
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let R = range.s.r; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      if (!ws[addr]) ws[addr] = { t: 's', v: '' };
      const cell = ws[addr];
      cell.s = {
        alignment: { vertical: 'top', horizontal: C === 3 ? 'center' : 'left', wrapText: true },
        border: {
          top: { style: 'thin', color: { rgb: 'D5D1C5' } }, bottom: { style: 'thin', color: { rgb: 'D5D1C5' } },
          left: { style: 'thin', color: { rgb: 'D5D1C5' } }, right: { style: 'thin', color: { rgb: 'D5D1C5' } },
        },
        font: { name: 'Pretendard', sz: 10 },
      };
      if (R === 0) {
        cell.s.font = { name: 'Pretendard', sz: 10, bold: true, color: { rgb: 'FFFFFF' } };
        cell.s.fill = { fgColor: { rgb: '2D2A26' }, patternType: 'solid' };
        cell.s.alignment = { vertical: 'center', horizontal: 'center', wrapText: true };
      } else if (C === 0) {
        cell.s.fill = { fgColor: { rgb: 'F5F4EF' }, patternType: 'solid' };
        cell.s.font = { name: 'Pretendard', sz: 10, bold: true };
      } else if (C === 1) {
        cell.s.fill = { fgColor: { rgb: 'FDFCFA' }, patternType: 'solid' };
      } else if (C === 3) {
        cell.s.font = { name: 'Pretendard', sz: 10 };
      }
    }
  }
  // Exclusions sheet
  const exAoa = [['제외 카테고리', '성명', '직위', '소속']];
  for (const cat of EXCLUSION_KEYS) {
    const arr = EXCLUSION_DATA[cat] || [];
    if (arr.length === 0) {
      exAoa.push([cat, '(원본 데이터에 미포함)', '', '']);
    } else {
      arr.forEach((p, i) => exAoa.push([i === 0 ? cat : '', p.name, p.rank || '', p.dept || '']));
    }
  }
  const exWs = XLSX.utils.aoa_to_sheet(exAoa);
  exWs['!cols'] = [{ wch: 18 }, { wch: 16 }, { wch: 14 }, { wch: 40 }];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '본사 리더 명단');
  XLSX.utils.book_append_sheet(wb, exWs, '제외 항목');

  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array', cellStyles: true });
  const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '본사 리더 명단.xlsx';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
